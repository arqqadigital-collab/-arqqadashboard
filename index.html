<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>arqq·a — Ops Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9b9b96;
    --border-light: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.14);
    --border-strong: rgba(0,0,0,0.22);
    --accent: #E24B4A;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #242422;
      --bg-tertiary: #2c2c2a;
      --text-primary: #f0efe9;
      --text-secondary: #a0a09a;
      --text-tertiary: #6b6b66;
      --border-light: rgba(255,255,255,0.07);
      --border-mid: rgba(255,255,255,0.12);
      --border-strong: rgba(255,255,255,0.2);
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  .topnav { background: var(--bg-primary); border-bottom: 0.5px solid var(--border-mid); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; gap: 12px; flex-wrap: wrap; }
  @media (max-width: 900px) { .topnav { height: auto; padding: 10px 1rem; } }

  .logo { font-size: 17px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.5px; white-space: nowrap; }
  .logo .dot { color: var(--accent); }

  .nav-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  select, button { font-family: inherit; font-size: 12px; padding: 6px 11px; border-radius: var(--radius-md); border: 0.5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text-primary); cursor: pointer; outline: none; transition: border-color 0.15s; }
  select:hover, button:hover { border-color: var(--border-strong); }
  select:focus { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 500; }
  button.primary:hover { opacity: 0.88; }

  .month-nav { display: flex; align-items: center; gap: 4px; }
  .month-nav button { padding: 5px 9px; font-size: 13px; }
  .month-label { font-size: 12px; font-weight: 500; color: var(--text-primary); min-width: 110px; text-align: center; white-space: nowrap; }

  .container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem; }
  @media (max-width: 768px) { .container { padding: 1rem; } }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 5px; }
  .stat.danger .stat-value { color: #E24B4A; }
  .stat.warn .stat-value { color: #BA7517; }
  .stat.ok .stat-value { color: #1D9E75; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 1.5rem; }
  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
  .grid-full { margin-bottom: 1.5rem; }

  .section-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; }

  .card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 16px 18px; }

  /* Workload */
  .team-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; }
  .team-row:not(:last-child) { border-bottom: 0.5px solid var(--border-light); }
  .team-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .team-name { flex: 1; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-members { font-size: 11px; color: var(--text-tertiary); min-width: 60px; text-align: right; }
  .workload-bar { flex: 2; height: 6px; background: var(--bg-secondary); border-radius: 3px; overflow: hidden; }
  .workload-fill { height: 100%; border-radius: 3px; background: #378ADD; transition: width 0.5s ease; }
  .workload-fill.heavy { background: #E24B4A; }
  .workload-fill.mid { background: #BA7517; }
  .workload-count { font-size: 13px; font-weight: 500; color: var(--text-primary); min-width: 28px; text-align: right; }

  /* Client cards */
  .client-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 2px; }
  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 10px; }
  .client-card { background: var(--bg-primary); border: 0.5px solid var(--border-light); border-radius: var(--radius-lg); padding: 14px 16px; transition: border-color 0.15s; position: relative; }
  .client-card:hover { border-color: var(--border-strong); }
  .client-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; gap: 6px; }
  .client-name { font-size: 13px; font-weight: 500; color: var(--text-primary); display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; }
  .client-name-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .health-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: #1D9E75; }
  .dot-amber { background: #BA7517; }
  .dot-red { background: #E24B4A; }
  .high-load-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 99px; background: #FAEEDA; color: #854F0B; white-space: nowrap; flex-shrink: 0; letter-spacing: 0.3px; }
  @media (prefers-color-scheme: dark) { .high-load-badge { background: #2a1e08; color: #FAC775; } }
  .progress-bar { height: 4px; background: var(--bg-secondary); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .client-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-tertiary); }

  /* Calendar */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-month-label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
  .cal-day-label { font-size: 11px; color: var(--text-tertiary); text-align: center; padding: 4px 0; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-cell { min-height: 90px; background: var(--bg-secondary); border-radius: 6px; padding: 6px 7px; font-size: 10px; vertical-align: top; }
  .cal-cell.other-month { opacity: 0.4; }
  .cal-date { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
  .cal-cell.today .cal-date { color: var(--accent); }
  .cal-cell.today { border: 1.5px solid var(--accent); }
  .cal-task-item { padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; font-size: 10px; font-weight: 500; cursor: default; line-height: 1.4; }
  .cal-task-item .cal-task-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .cal-task-item .cal-task-meta { font-size: 9px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .cal-task-item.scheduled { background: #B5D4F4; color: #0C447C; }
  .cal-task-item.review { background: #FAC775; color: #633806; }
  .cal-task-item.published { background: #C0DD97; color: #27500A; }
  .cal-task-item.blocked { background: #F5C4B3; color: #993C1D; }
  .cal-more { font-size: 9px; color: var(--text-tertiary); padding: 1px 4px; }
  @media (prefers-color-scheme: dark) {
    .cal-task-item.scheduled { background: #0c2640; color: #85B7EB; }
    .cal-task-item.review { background: #2a1e08; color: #FAC775; }
    .cal-task-item.published { background: #0f2206; color: #97C459; }
    .cal-task-item.blocked { background: #2a1010; color: #F5C4B3; }
  }
  .cal-legend { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .cal-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Timeline */
  .timeline-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 0.5px solid var(--border-light); font-size: 12px; }
  .timeline-row:last-child { border-bottom: none; }
  .tl-name { min-width: 160px; max-width: 160px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
  .tl-bar-wrap { flex: 1; height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
  .tl-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .tl-pct { min-width: 36px; text-align: right; color: var(--text-secondary); font-size: 11px; }
  .tl-tasks { min-width: 60px; text-align: right; font-size: 11px; color: var(--text-tertiary); }
  .tl-due { min-width: 64px; text-align: right; font-size: 11px; color: var(--text-tertiary); }
  .tl-due.overdue { color: #E24B4A; font-weight: 500; }
  .tl-due.soon { color: #BA7517; }

  .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 0; color: var(--text-secondary); font-size: 14px; gap: 14px; }
  .spinner { width: 26px; height: 26px; border: 2px solid var(--border-mid); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: #FCEBEB; color: #A32D2D; border-radius: var(--radius-lg); padding: 16px 18px; font-size: 13px; line-height: 1.7; }
  @media (prefers-color-scheme: dark) { .error-box { background: #2a0a0a; color: #F09595; } }

  .empty { font-size: 13px; color: var(--text-tertiary); padding: 10px 0; }
  .last-updated { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; }

  .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .badge.todo { background: #F1EFE8; color: #5F5E5A; }
  .badge.prog { background: #E6F1FB; color: #185FA5; }
  .badge.review { background: #FAEEDA; color: #854F0B; }
  .badge.done { background: #EAF3DE; color: #3B6D11; }
  .badge.block { background: #FCEBEB; color: #A32D2D; }
  @media (prefers-color-scheme: dark) {
    .badge.todo { background: #2c2c2a; color: #a0a09a; }
    .badge.prog { background: #0c2640; color: #85B7EB; }
    .badge.review { background: #2a1e08; color: #FAC775; }
    .badge.done { background: #0f2206; color: #97C459; }
    .badge.block { background: #2a0a0a; color: #F09595; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="logo">arqq<span class="dot">·</span>a <span style="font-size:13px;font-weight:400;color:var(--text-tertiary);">ops dashboard</span></div>
  <div class="nav-right">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span class="month-label" id="monthLabel">—</span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <select id="filterSpace"><option value="all">All spaces</option></select>
    <select id="filterClient"><option value="all">All clients</option></select>
    <select id="filterTeam"><option value="all">All teams</option></select>
    <span class="last-updated" id="lastUpdated"></span>
    <button class="primary" onclick="refreshAll()">↻ Refresh</button>
  </div>
</nav>

<div class="container">
  <div id="mainContent">
    <div class="loader"><div class="spinner"></div><span id="loaderMsg">Connecting to ClickUp...</span></div>
  </div>
</div>

<script>
const API_TOKEN = 'pk_93647571_I5V8ZL90AAK46O5FRIRUE2VH8VZCK2RO';
const BASE = 'https://api.clickup.com/api/v2';
let allTasks = [];
let cuTeams = [];
let teamMemberMap = {};  // userId -> [teamName, ...]
let selectedYear = new Date().getFullYear();
let selectedMonth = new Date().getMonth(); // 0-indexed
let calViewYear = new Date().getFullYear();
let calViewMonth = new Date().getMonth();

// ── Helpers ──────────────────────────────────────────────────────────────────

function setLoaderMsg(msg) {
  const el = document.getElementById('loaderMsg');
  if (el) el.textContent = msg;
}

async function cu(path) {
  const r = await fetch(BASE + path, { headers: { Authorization: API_TOKEN } });
  if (!r.ok) throw new Error('ClickUp API ' + r.status + ' → ' + path);
  return r.json();
}

function updateMonthLabel() {
  const d = new Date(selectedYear, selectedMonth, 1);
  document.getElementById('monthLabel').textContent = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

function changeMonth(dir) {
  selectedMonth += dir;
  if (selectedMonth > 11) { selectedMonth = 0; selectedYear++; }
  if (selectedMonth < 0)  { selectedMonth = 11; selectedYear--; }
  calViewMonth = selectedMonth;
  calViewYear = selectedYear;
  updateMonthLabel();
  renderDashboard();
}

function monthRange() {
  const start = new Date(selectedYear, selectedMonth, 1).getTime();
  const end   = new Date(selectedYear, selectedMonth + 1, 0, 23, 59, 59, 999).getTime();
  return { start, end };
}

function inSelectedMonth(ts) {
  if (!ts) return false;
  const t = parseInt(ts);
  const { start, end } = monthRange();
  return t >= start && t <= end;
}

function statusClass(s) {
  if (!s) return 'todo';
  const n = s.toLowerCase();
  if (n.includes('progress') || n === 'doing') return 'prog';
  if (n.includes('review') || n.includes('approval')) return 'review';
  if (n.includes('complete') || n.includes('done') || n.includes('closed')) return 'done';
  if (n.includes('block') || n.includes('hold')) return 'block';
  return 'todo';
}

function calTaskClass(s) {
  if (!s) return 'scheduled';
  const n = s.toLowerCase();
  if (n.includes('complete') || n.includes('done') || n.includes('published') || n.includes('closed')) return 'published';
  if (n.includes('review') || n.includes('approval')) return 'review';
  if (n.includes('block') || n.includes('hold')) return 'blocked';
  return 'scheduled';
}

function fmtDate(ts) {
  if (!ts) return '';
  return new Date(parseInt(ts)).toLocaleDateString('en-GB', { day: '2-digit', month: 'short' });
}

function dueClass(ts) {
  if (!ts) return '';
  const diff = parseInt(ts) - Date.now();
  if (diff < 0) return 'overdue';
  if (diff < 7 * 86400000) return 'soon';
  return '';
}

function daysStuck(ts) {
  if (!ts) return 0;
  return Math.floor((Date.now() - parseInt(ts)) / 86400000);
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

const TEAM_COLORS = [
  { bg: '#B5D4F4', fg: '#0C447C' },
  { bg: '#9FE1CB', fg: '#085041' },
  { bg: '#FAC775', fg: '#633806' },
  { bg: '#F4C0D1', fg: '#72243E' },
  { bg: '#CED0F6', fg: '#3C3489' },
  { bg: '#F5C4B3', fg: '#993C1D' },
  { bg: '#C0DD97', fg: '#27500A' },
];
function teamColor(name) {
  let h = 0; for (const c of (name || '')) h = (h * 31 + c.charCodeAt(0)) % TEAM_COLORS.length;
  return TEAM_COLORS[h];
}

// ── Data fetching ─────────────────────────────────────────────────────────────

async function getWorkspaceId() {
  const d = await cu('/team');
  return d.teams[0].id;
}

async function fetchTeams(teamId) {
  try {
    const d = await cu('/team/' + teamId + '/group');
    cuTeams = d.groups || [];
    teamMemberMap = {};
    cuTeams.forEach(g => {
      (g.members || []).forEach(m => {
        const uid = String(m.id || m.user?.id);
        if (!teamMemberMap[uid]) teamMemberMap[uid] = [];
        teamMemberMap[uid].push(g.name);
      });
    });
  } catch(e) {
    cuTeams = [];
  }
}

async function getAllTasks(teamId) {
  const sData = await cu('/team/' + teamId + '/space?archived=false');
  const spaces = sData.spaces;
  const listMap = {};

  setLoaderMsg('Loading workspace structure...');

  await Promise.all(spaces.map(async space => {
    const [fData, flData] = await Promise.all([
      cu('/space/' + space.id + '/folder?archived=false'),
      cu('/space/' + space.id + '/list?archived=false')
    ]);
    flData.lists.forEach(l => {
      listMap[l.id] = { name: l.name, folderName: 'Unfoldered', spaceName: space.name };
    });
    await Promise.all(fData.folders.map(async folder => {
      const lData = await cu('/folder/' + folder.id + '/list?archived=false');
      lData.lists.forEach(l => {
        listMap[l.id] = { name: l.name, folderName: folder.name, spaceName: space.name };
      });
    }));
  }));

  setLoaderMsg('Fetching tasks...');
  const tasks = [];
  let page = 0;

  while (page < 15) {
    setLoaderMsg('Fetching tasks... (' + tasks.length + ' loaded)');
    const params = new URLSearchParams({ page, order_by: 'updated', reverse: 'true', include_closed: 'true', subtasks: 'true' });
    const tData = await cu('/team/' + teamId + '/task?' + params.toString());
    const batch = tData.tasks || [];
    batch.forEach(t => {
      const info = listMap[t.list && t.list.id] || {};
      t._space    = info.spaceName  || (t.space && t.space.name) || 'Unknown';
      t._folder   = info.folderName || 'Unfoldered';
      t._list     = info.name       || (t.list && t.list.name)   || '';
      // attach team names for assignees
      t._teams = [];
      (t.assignees || []).forEach(a => {
        const uid = String(a.id || a.user?.id);
        const tnames = teamMemberMap[uid] || [];
        tnames.forEach(tn => { if (!t._teams.includes(tn)) t._teams.push(tn); });
      });
    });
    tasks.push(...batch);
    if (!batch.length || tData.last_page) break;
    page++;
  }
  return tasks;
}

// ── Filters ───────────────────────────────────────────────────────────────────

function populateFilters() {
  const spSel = document.getElementById('filterSpace');
  const clSel = document.getElementById('filterClient');
  const tmSel = document.getElementById('filterTeam');

  [spSel, clSel, tmSel].forEach(s => { while (s.options.length > 1) s.remove(1); });

  [...new Set(allTasks.map(t => t._space).filter(Boolean))].sort().forEach(s => {
    const o = document.createElement('option'); o.value = s; o.textContent = s; spSel.appendChild(o);
  });
  [...new Set(allTasks.map(t => t._folder).filter(f => f && f !== 'Unfoldered'))].sort().forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c; clSel.appendChild(o);
  });
  cuTeams.forEach(g => {
    const o = document.createElement('option'); o.value = g.name; o.textContent = g.name; tmSel.appendChild(o);
  });
  [spSel, clSel, tmSel].forEach(sel => { sel.onchange = renderDashboard; });
}

function getFiltered() {
  const sp = document.getElementById('filterSpace').value;
  const cl = document.getElementById('filterClient').value;
  const tm = document.getElementById('filterTeam').value;
  const { start, end } = monthRange();

  return allTasks.filter(t => {
    if (sp !== 'all' && t._space !== sp) return false;
    if (cl !== 'all' && t._folder !== cl) return false;
    if (tm !== 'all' && !(t._teams || []).includes(tm)) return false;
    // month filter: task was created, updated, or due within selected month
    const dates = [t.date_created, t.date_updated, t.due_date].map(d => d ? parseInt(d) : 0);
    const active = dates.some(d => d >= start && d <= end);
    return active;
  });
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderDashboard() {
  const tasks = getFiltered();
  const now = Date.now();
  const { start, end } = monthRange();

  // Stats
  const total      = tasks.length;
  const overdue    = tasks.filter(t => t.due_date && parseInt(t.due_date) < now && !['complete','closed','done'].some(x => (t.status?.status||'').toLowerCase().includes(x))).length;
  const inProgress = tasks.filter(t => (t.status?.status||'').toLowerCase().includes('progress')).length;
  const done       = tasks.filter(t => ['complete','closed','done'].some(x => (t.status?.status||'').toLowerCase().includes(x))).length;
  const dueSoon    = tasks.filter(t => t.due_date && parseInt(t.due_date) > now && parseInt(t.due_date) < now + 3*86400000).length;
  const blocked    = tasks.filter(t => (t.status?.status||'').toLowerCase().includes('block')).length;

  // ── Team workload (by ClickUp group) ──────────────────────────────────────
  const teamWork = {};
  cuTeams.forEach(g => { teamWork[g.name] = { name: g.name, count: 0, members: g.members?.length || 0 }; });
  tasks.forEach(t => {
    (t._teams || []).forEach(tn => { if (teamWork[tn]) teamWork[tn].count++; });
  });
  const wList = Object.values(teamWork).filter(t => t.count > 0).sort((a,b) => b.count - a.count);
  const maxW = wList[0]?.count || 1;

  // ── Social clients (Operations space) ─────────────────────────────────────
  const weekStart = new Date(); weekStart.setHours(0,0,0,0); weekStart.setDate(weekStart.getDate() - weekStart.getDay());
  const weekEnd   = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 7);

  const socialClients = {};
  const webAppClients = {};

  tasks.forEach(t => {
    if (!t._folder || t._folder === 'Unfoldered') return;
    const isWeb = t._space && (t._space.toLowerCase().includes('web') || t._space.toLowerCase().includes('app'));
    const bucket = isWeb ? webAppClients : socialClients;
    if (!bucket[t._folder]) bucket[t._folder] = { name: t._folder, total:0, done:0, overdue:0, thisWeek:0 };
    bucket[t._folder].total++;
    if (['complete','closed','done'].some(x => (t.status?.status||'').toLowerCase().includes(x))) bucket[t._folder].done++;
    if (t.due_date && parseInt(t.due_date) < now) bucket[t._folder].overdue++;
    // this-week activity for High Load badge
    if (!isWeb) {
      const upd = parseInt(t.date_updated || 0);
      const due = parseInt(t.due_date || 0);
      if ((upd >= weekStart.getTime() && upd < weekEnd.getTime()) || (due >= weekStart.getTime() && due < weekEnd.getTime())) {
        bucket[t._folder].thisWeek++;
      }
    }
  });

  const socialCList  = Object.values(socialClients).sort((a,b) => b.total - a.total);
  const webAppCList  = Object.values(webAppClients).sort((a,b) => b.total - a.total);

  // Top 3 by this-week activity = High Load
  const highLoadSet = new Set(
    [...socialCList].sort((a,b) => b.thisWeek - a.thisWeek).slice(0, 3).filter(c => c.thisWeek > 0).map(c => c.name)
  );

  // ── Social calendar (full month) ──────────────────────────────────────────
  const socialTasks = allTasks.filter(t => (t._list||'').toLowerCase().includes('social'));
  const calMap = {};
  socialTasks.forEach(t => {
    if (!t.due_date) return;
    const d = new Date(parseInt(t.due_date));
    if (d.getFullYear() !== calViewYear || d.getMonth() !== calViewMonth) return;
    const key = d.getDate();
    if (!calMap[key]) calMap[key] = [];
    calMap[key].push(t);
  });

  // Build full-month calendar grid (pad with prev/next month days)
  const firstDay = new Date(calViewYear, calViewMonth, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
  const daysInPrev  = new Date(calViewYear, calViewMonth, 0).getDate();
  const calCells = [];
  for (let i = firstDay - 1; i >= 0; i--) calCells.push({ day: daysInPrev - i, otherMonth: true });
  for (let i = 1; i <= daysInMonth; i++) calCells.push({ day: i, otherMonth: false });
  const remaining = 42 - calCells.length;
  for (let i = 1; i <= remaining; i++) calCells.push({ day: i, otherMonth: true });
  const todayDate = new Date();

  // ── Web timeline (full width) ─────────────────────────────────────────────
  const webTasks = allTasks.filter(t => t._space && (t._space.toLowerCase().includes('web') || t._space.toLowerCase().includes('app')));
  const webMap = {};
  webTasks.forEach(t => {
    if (!webMap[t._folder]) webMap[t._folder] = { name: t._folder, total:0, done:0, due: null };
    webMap[t._folder].total++;
    if (['complete','closed','done'].some(x => (t.status?.status||'').toLowerCase().includes(x))) webMap[t._folder].done++;
    if (t.due_date && (!webMap[t._folder].due || parseInt(t.due_date) > webMap[t._folder].due)) webMap[t._folder].due = parseInt(t.due_date);
  });
  const wbList = Object.values(webMap).sort((a,b) => (a.due||0) - (b.due||0));

  // ── Client card renderer ──────────────────────────────────────────────────
  function clientCardHTML(c, isHighLoad) {
    const pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
    const health = c.overdue > 3 ? 'dot-red' : c.overdue > 0 ? 'dot-amber' : 'dot-green';
    const healthLabel = c.overdue > 3 ? 'at risk' : c.overdue > 0 ? 'watch' : 'on track';
    const barColor = pct > 70 ? '#1D9E75' : pct > 40 ? '#BA7517' : '#E24B4A';
    return `<div class="client-card">
      <div class="client-card-header">
        <div class="client-name"><span class="health-dot ${health}"></span><span class="client-name-text" title="${c.name}">${c.name}</span></div>
        ${isHighLoad ? '<span class="high-load-badge">⚡ High Load</span>' : ''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
      <div class="client-meta"><span>${pct}% done</span><span>${healthLabel}</span></div>
      <div style="font-size:11px;color:var(--text-tertiary);margin-top:5px;">${c.total} tasks · ${c.overdue} overdue</div>
    </div>`;
  }

  // ── Render HTML ───────────────────────────────────────────────────────────
  document.getElementById('mainContent').innerHTML = `

    <div class="stat-grid">
      <div class="stat"><div class="stat-label">Total tasks</div><div class="stat-value">${total}</div><div class="stat-sub">this month</div></div>
      <div class="stat danger"><div class="stat-label">Overdue</div><div class="stat-value">${overdue}</div><div class="stat-sub">need attention</div></div>
      <div class="stat"><div class="stat-label">In progress</div><div class="stat-value">${inProgress}</div></div>
      <div class="stat ok"><div class="stat-label">Completed</div><div class="stat-value">${done}</div></div>
      <div class="stat warn"><div class="stat-label">Due in 3 days</div><div class="stat-value">${dueSoon}</div></div>
      <div class="stat danger"><div class="stat-label">Blocked</div><div class="stat-value">${blocked}</div></div>
    </div>

    <div class="grid-full">
      <div class="section-label">Team workload</div>
      <div class="card">
        ${wList.length ? wList.map(w => {
          const pct = Math.round((w.count / maxW) * 100);
          const cls = pct > 80 ? 'heavy' : pct > 50 ? 'mid' : '';
          const col = teamColor(w.name);
          return `<div class="team-row">
            <div class="team-icon" style="background:${col.bg};color:${col.fg}">${getInitials(w.name)}</div>
            <div class="team-name">${w.name}</div>
            <div class="team-members">${w.members} members</div>
            <div class="workload-bar"><div class="workload-fill ${cls}" style="width:${pct}%"></div></div>
            <div class="workload-count">${w.count}</div>
          </div>`;
        }).join('') : '<div class="empty">No team task data for this period</div>'}
      </div>
    </div>

    <div class="grid-full">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <div class="section-label" style="margin-bottom:0;">Client project status</div>
        <div style="display:flex;gap:8px;">
          <span style="font-size:11px;padding:2px 9px;border-radius:99px;background:#E6F1FB;color:#185FA5;font-weight:500;">● Social media</span>
          <span style="font-size:11px;padding:2px 9px;border-radius:99px;background:#EAF3DE;color:#3B6D11;font-weight:500;">● Web &amp; apps</span>
        </div>
      </div>

      ${socialCList.length ? `
        <div class="client-section-title" style="color:#185FA5;">Social media clients — Operations</div>
        <div class="client-grid" style="margin-bottom:18px;">
          ${socialCList.map(c => clientCardHTML(c, highLoadSet.has(c.name))).join('')}
        </div>` : ''}

      ${webAppCList.length ? `
        <div class="client-section-title" style="color:#3B6D11;">Web &amp; apps clients — Websites &amp; Apps</div>
        <div class="client-grid">
          ${webAppCList.map(c => clientCardHTML(c, false)).join('')}
        </div>` : ''}

      ${!socialCList.length && !webAppCList.length ? '<div class="empty">No client data for this period</div>' : ''}
    </div>

    <div class="grid-full">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
        <div class="section-label" style="margin-bottom:0;">Social media calendar</div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button onclick="calNav(-1)" style="padding:4px 10px;">‹</button>
          <span style="font-size:13px;font-weight:600;color:var(--text-primary);min-width:120px;text-align:center;" id="calMonthLabel"></span>
          <button onclick="calNav(1)" style="padding:4px 10px;">›</button>
        </div>
      </div>
      <div class="card" style="padding:16px;">
        <div class="cal-header">
          ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => `<div class="cal-day-label">${d}</div>`).join('')}
        </div>
        <div class="cal-grid">
          ${calCells.map(cell => {
            const tasks = (!cell.otherMonth && calMap[cell.day]) ? calMap[cell.day] : [];
            const isToday = !cell.otherMonth && cell.day === todayDate.getDate() && calViewMonth === todayDate.getMonth() && calViewYear === todayDate.getFullYear();
            return `<div class="cal-cell${cell.otherMonth ? ' other-month' : ''}${isToday ? ' today' : ''}">
              <div class="cal-date">${cell.day}</div>
              ${tasks.slice(0, 3).map(t => {
                const cls = calTaskClass(t.status?.status);
                const assignee = t.assignees?.[0] ? getInitials(t.assignees[0].username || t.assignees[0].email || '') : '';
                return `<div class="cal-task-item ${cls}">
                  <span class="cal-task-name">${t.name}</span>
                  <span class="cal-task-meta">${assignee ? assignee + ' · ' : ''}${t.status?.status || ''}</span>
                </div>`;
              }).join('')}
              ${tasks.length > 3 ? `<div class="cal-more">+${tasks.length - 3} more</div>` : ''}
            </div>`;
          }).join('')}
        </div>
        <div class="cal-legend">
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#B5D4F4;"></div>Scheduled</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#FAC775;"></div>In review</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#C0DD97;"></div>Published</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#F5C4B3;"></div>Blocked</div>
        </div>
      </div>
    </div>

    <div class="grid-full">
      <div class="section-label">Websites &amp; apps — delivery timeline</div>
      <div class="card">
        ${wbList.length ? wbList.map(c => {
          const pct = c.total ? Math.round((c.done / c.total) * 100) : 0;
          const barColor = pct > 70 ? '#1D9E75' : pct > 40 ? '#BA7517' : '#E24B4A';
          const dc = c.due ? (c.due < now ? 'overdue' : c.due < now + 7*86400000 ? 'soon' : '') : '';
          return `<div class="timeline-row">
            <div class="tl-name">${c.name}</div>
            <div class="tl-bar-wrap"><div class="tl-bar" style="width:${pct}%;background:${barColor}"></div></div>
            <div class="tl-pct">${pct}%</div>
            <div class="tl-tasks">${c.total} tasks</div>
            <div class="tl-due ${dc}">${c.due ? fmtDate(c.due) : 'no date'}</div>
          </div>`;
        }).join('') : '<div class="empty">No web/app tasks found in the Websites &amp; Apps space</div>'}
      </div>
    </div>
  `;

  // Update calendar month label
  const calLabel = document.getElementById('calMonthLabel');
  if (calLabel) calLabel.textContent = new Date(calViewYear, calViewMonth, 1).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

function calNav(dir) {
  calViewMonth += dir;
  if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
  if (calViewMonth < 0)  { calViewMonth = 11; calViewYear--; }
  renderDashboard();
}

async function refreshAll() {
  document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spinner"></div><span id="loaderMsg">Refreshing...</span></div>';
  await loadData();
}

async function loadData() {
  try {
    document.getElementById('lastUpdated').textContent = '';
    updateMonthLabel();
    const teamId = await getWorkspaceId();
    document.getElementById('mainContent').innerHTML = '<div class="loader"><div class="spinner"></div><span id="loaderMsg">Loading teams...</span></div>';
    await fetchTeams(teamId);
    allTasks = await getAllTasks(teamId);
    populateFilters();
    renderDashboard();
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="error-box"><strong>Could not connect to ClickUp</strong><br><br>${e.message}<br><br>Make sure the API token is valid. If hosting locally, CORS may block requests — deploy to Netlify or a web server.</div>`;
  }
}

loadData();
</script>
</body>
</html>
